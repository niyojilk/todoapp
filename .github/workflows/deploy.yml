name: Deploy to Dev Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed at $(date)"

      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Setup SSH for subsequent commands
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && \
             rm -rf venv .env && \
             python3 -m venv venv && \
             source venv/bin/activate && \
             pip install --upgrade pip && \
             pip install -r requirements.txt"

          # Pull latest code
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && git pull origin main"

          # Create systemd service file
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cat > /etc/systemd/system/todoapp.service << 'SERVICEFILE'
[Unit]
Description=Todo App Server
After=network.target

[Service]
Type=simple
User=www-data
WorkingDirectory=$DEPLOY_PATH
Environment=\"PATH=\$DEPLOY_PATH/venv/bin:/usr/bin\"
ExecStart=$DEPLOY_PATH/venv/bin/python server.py
Restart=always
RestartSec=5

[Install]
WantedBy=multi-user.target
SERVICEFILE
             systemctl daemon-reload"

          # Start the server
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && \
             source venv/bin/activate && \
             nohup python server.py > server.log 2>&1 &"

          echo "Deployment completed at $(date)"
