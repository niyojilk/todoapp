name: Deploy to Dev Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed at $(date)"

      - name: Setup SSH and deploy
        uses: webfactory/ssh-agent@v0.6.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to server
        run: |
          # Setup SSH for subsequent commands
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             rm -rf venv .env && \
             python3 -m venv venv && \
             source venv/bin/activate && \
             pip install --upgrade pip && \
             pip install -r requirements.txt"

          # Pull latest code
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && git pull origin main"

          # Start the server
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             source venv/bin/activate && \
             nohup python server.py > server.log 2>&1 &"

          # Create a simple systemd service file
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes ${{ secrets.SSH_HOST }} \
            "cat > /etc/systemd/system/todoapp.service << EOF
[Unit]
Description=Todo App Server
After=network.target

[Service]
Type=simple
User=www-data
WorkingDirectory=${{ secrets.DEPLOY_PATH }}
Environment=\"PATH=${{ secrets.DEPLOY_PATH }}/venv/bin:/usr/bin\"
ExecStart=${{ secrets.DEPLOY_PATH }}/venv/bin/python server.py
Restart=always

[Install]
WantedBy=multi-user.target
EOF
             systemctl daemon-reexec"

          echo "Deployment completed at $(date)"
