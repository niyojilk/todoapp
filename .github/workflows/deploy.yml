name: Deploy to Dev Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Remove old deployment
            cd ${{ secrets.DEPLOY_PATH }}
            rm -rf venv .env

            # Create virtual environment and install dependencies
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Pull latest code from GitHub
            git pull origin main

            # Create systemd service file
            echo '[Unit]' > /etc/systemd/system/todoapp.service
            echo 'Description=Todo App Server' >> /etc/systemd/system/todoapp.service
            echo 'After=network.target' >> /etc/systemd/system/todoapp.service
            echo '' >> /etc/systemd/system/todoapp.service
            echo '[Service]' >> /etc/systemd/system/todoapp.service
            echo 'Type=simple' >> /etc/systemd/system/todoapp.service
            echo 'User=www-data' >> /etc/systemd/system/todoapp.service
            echo "WorkingDirectory=${{ secrets.DEPLOY_PATH }}" >> /etc/systemd/system/todoapp.service
            echo 'Environment="PATH=${{ secrets.DEPLOY_PATH }}/venv/bin:/usr/bin"' >> /etc/systemd/system/todoapp.service
            echo "ExecStart=${{ secrets.DEPLOY_PATH }}/venv/bin/python server.py" >> /etc/systemd/system/todoapp.service
            echo 'Restart=always' >> /etc/systemd/system/todoapp.service
            echo 'RestartSec=5' >> /etc/systemd/system/todoapp.service
            echo '' >> /etc/systemd/system/todoapp.service
            echo '[Install]' >> /etc/systemd/system/todoapp.service
            echo 'WantedBy=multi-user.target' >> /etc/systemd/system/todoapp.service

            # Reload systemd
            systemctl daemon-reload

            # Start the server
            source venv/bin/activate
            nohup python server.py > server.log 2>&1 &

            echo "Deployment completed at $(date)"
