name: Deploy to Dev Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed at $(date)"

      - name: Deploy to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          # Setup SSH for subsequent commands
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && \
             rm -rf venv .env && \
             python3 -m venv venv && \
             source venv/bin/activate && \
             pip install --upgrade pip && \
             pip install -r requirements.txt"

          # Pull latest code from GitHub (or init git if fresh deploy)
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && \
             if [ -f .git/config ]; then \
               git pull origin main; \
             else \
               git init && \
               git remote add origin https://github.com/niyojilk/todoapp.git && \
               git fetch origin && \
               git reset --hard origin/main; \
             fi"

          # Create systemd service file using echo
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "echo '[Unit]' > /etc/systemd/system/todoapp.service && \
             echo 'Description=Todo App Server' >> /etc/systemd/system/todoapp.service && \
             echo 'After=network.target' >> /etc/systemd/system/todoapp.service && \
             echo '' >> /etc/systemd/system/todoapp.service && \
             echo '[Service]' >> /etc/systemd/system/todoapp.service && \
             echo 'Type=simple' >> /etc/systemd/system/todoapp.service && \
             echo 'User=www-data' >> /etc/systemd/system/todoapp.service && \
             echo "WorkingDirectory=$DEPLOY_PATH" >> /etc/systemd/system/todoapp.service && \
             echo 'Environment=\"PATH=\$DEPLOY_PATH/venv/bin:/usr/bin\"' >> /etc/systemd/system/todoapp.service && \
             # Note: SSH_HOST is NOT used here - only DEPLOY_PATH is used
echo "ExecStart=$DEPLOY_PATH/venv/bin/python server.py" >> /etc/systemd/system/todoapp.service && \
             echo 'Restart=always' >> /etc/systemd/system/todoapp.service && \
             echo 'RestartSec=5' >> /etc/systemd/system/todoapp.service && \
             echo '' >> /etc/systemd/system/todoapp.service && \
             echo '[Install]' >> /etc/systemd/system/todoapp.service && \
             echo 'WantedBy=multi-user.target' >> /etc/systemd/system/todoapp.service && \
             systemctl daemon-reload"

          # Start the server
          ssh -o StrictHostKeyChecking=no -o BatchMode=yes $SSH_HOST \
            "cd $DEPLOY_PATH && \
             source venv/bin/activate && \
             nohup python server.py > server.log 2>&1 &"

          echo "Deployment completed at $(date)"
